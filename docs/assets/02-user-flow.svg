<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="340" fill="#FAFAF8"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="600" fill="#1C1917">User Flow</text>
  <text x="60" y="74" font-size="13" fill="#78716C">From first visit to first outfit — the complete journey</text>
  <line x1="60" y1="90" x2="840" y2="90" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Step nodes -->
  <!-- Step 1: Landing -->
  <circle cx="110" cy="185" r="36" fill="#1C1917"/>
  <text x="110" y="181" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Land</text>
  <text x="110" y="195" font-size="11" fill="#A8956E" text-anchor="middle">page</text>
  <text x="110" y="240" font-size="12" fill="#78716C" text-anchor="middle">Discovery</text>

  <!-- Arrow 1 -->
  <line x1="148" y1="185" x2="188" y2="185" stroke="#D4CFC9" stroke-width="1.5"/>
  <polygon points="188,180 196,185 188,190" fill="#D4CFC9"/>

  <!-- Step 2: Sign Up -->
  <circle cx="232" cy="185" r="36" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
  <text x="232" y="181" font-size="11" font-weight="600" fill="#1C1917" text-anchor="middle">Sign</text>
  <text x="232" y="195" font-size="11" fill="#78716C" text-anchor="middle">Up</text>
  <text x="232" y="240" font-size="12" fill="#78716C" text-anchor="middle">Onboarding</text>

  <!-- Arrow 2 -->
  <line x1="270" y1="185" x2="310" y2="185" stroke="#D4CFC9" stroke-width="1.5"/>
  <polygon points="310,180 318,185 310,190" fill="#D4CFC9"/>

  <!-- Step 3: Upload -->
  <circle cx="354" cy="185" r="36" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
  <text x="354" y="181" font-size="11" font-weight="600" fill="#1C1917" text-anchor="middle">Upload</text>
  <text x="354" y="195" font-size="11" fill="#78716C" text-anchor="middle">Items</text>
  <text x="354" y="240" font-size="12" fill="#78716C" text-anchor="middle">Input</text>

  <!-- Arrow 3 -->
  <line x1="392" y1="185" x2="432" y2="185" stroke="#D4CFC9" stroke-width="1.5"/>
  <polygon points="432,180 440,185 432,190" fill="#D4CFC9"/>

  <!-- Step 4: AI Analyzes -->
  <circle cx="476" cy="185" r="36" fill="#A8956E"/>
  <text x="476" y="181" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Claude</text>
  <text x="476" y="195" font-size="11" fill="#FAFAF8" text-anchor="middle">Analyzes</text>
  <text x="476" y="240" font-size="12" fill="#78716C" text-anchor="middle">AI Magic</text>

  <!-- Arrow 4 -->
  <line x1="514" y1="185" x2="554" y2="185" stroke="#D4CFC9" stroke-width="1.5"/>
  <polygon points="554,180 562,185 554,190" fill="#D4CFC9"/>

  <!-- Step 5: Wardrobe -->
  <circle cx="598" cy="185" r="36" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
  <text x="598" y="181" font-size="11" font-weight="600" fill="#1C1917" text-anchor="middle">View</text>
  <text x="598" y="195" font-size="11" fill="#78716C" text-anchor="middle">Wardrobe</text>
  <text x="598" y="240" font-size="12" fill="#78716C" text-anchor="middle">Browse</text>

  <!-- Arrow 5 -->
  <line x1="636" y1="185" x2="676" y2="185" stroke="#D4CFC9" stroke-width="1.5"/>
  <polygon points="676,180 684,185 676,190" fill="#D4CFC9"/>

  <!-- Step 6: Generate -->
  <circle cx="720" cy="185" r="36" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
  <text x="720" y="181" font-size="11" font-weight="600" fill="#1C1917" text-anchor="middle">Generate</text>
  <text x="720" y="195" font-size="11" fill="#78716C" text-anchor="middle">Outfits</text>
  <text x="720" y="240" font-size="12" fill="#78716C" text-anchor="middle">Generate</text>

  <!-- Arrow 6 -->
  <line x1="758" y1="185" x2="798" y2="185" stroke="#D4CFC9" stroke-width="1.5"/>
  <polygon points="798,180 806,185 798,190" fill="#D4CFC9"/>

  <!-- Step 7: Wow -->
  <circle cx="842" cy="185" r="36" fill="#1C1917"/>
  <text x="842" y="181" font-size="18" text-anchor="middle">✦</text>
  <text x="842" y="198" font-size="10" fill="#A8956E" text-anchor="middle">Wow</text>
  <text x="842" y="240" font-size="12" fill="#78716C" text-anchor="middle">Delight</text>

  <!-- Emotion bar -->
  <text x="60" y="278" font-size="11" font-weight="600" fill="#A8956E" letter-spacing="1.5">EMOTION</text>
  <text x="60" y="300" font-size="11" fill="#78716C">Curious</text>
  <text x="185" y="300" font-size="11" fill="#78716C">Hopeful</text>
  <text x="305" y="300" font-size="11" fill="#78716C">Effort</text>
  <text x="440" y="300" font-size="11" fill="#A8956E" font-weight="500">Anticipation</text>
  <text x="565" y="300" font-size="11" fill="#78716C">Familiar</text>
  <text x="675" y="300" font-size="11" fill="#78716C">Curious</text>
  <text x="800" y="300" font-size="11" fill="#1C1917" font-weight="600">Delight</text>

  <!-- Footer -->
  <text x="60" y="330" font-size="11" fill="#C4B8B0">Drape — AI Outfit Planner</text>
</svg>
