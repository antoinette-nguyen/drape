  <text x="326" y="170" font-size="12" font-weight="600" fill="#FFFFFF">Look 01 — Smart Casual</text>
  <text x="326" y="188" font-size="11" fill="#A8956E">White Tee · Navy Blazer</text>
  <text x="326" y="203" font-size="11" fill="#A8956E">Black Jeans</text>

  <rect x="310" y="225" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="326" y="250" font-size="12" font-weight="600" fill="#1C1917">Look 02 — Weekend</text>
  <text x="326" y="268" font-size="11" fill="#78716C">White Tee · Black Jeans</text>
  <text x="326" y="283" font-size="11" fill="#78716C">White Sneakers</text>

  <rect x="310" y="305" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="326" y="330" font-size="12" font-weight="600" fill="#1C1917">Look 03 — Layered</text>
  <text x="326" y="348" font-size="11" fill="#78716C">Navy Blazer · Beige Trench</text>
  <text x="326" y="363" font-size="11" fill="#78716C">White Sneakers</text>

  <rect x="310" y="385" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="326" y="410" font-size="12" font-weight="600" fill="#1C1917">Look 04 — Elevated</text>
  <text x="326" y="428" font-size="11" fill="#78716C">White Tee · Beige Trench</text>
  <text x="326" y="443" font-size="11" fill="#78716C">Silk Scarf</text>

  <!-- More indicator -->
  <text x="326" y="480" font-size="12" fill="#A8956E">+ 14 more combinations...</text>

  <!-- Stats panel -->
  <rect x="560" y="145" width="280" height="360" rx="12" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="590" y="185" font-size="13" font-weight="600" fill="#78716C">THE MATH</text>

  <text x="590" y="230" font-size="48" font-weight="700" fill="#1C1917">6</text>
  <text x="590" y="255" font-size="13" fill="#78716C">clothing items</text>

  <line x1="590" y1="275" x2="820" y2="275" stroke="#E7E5E4" stroke-width="1"/>

  <text x="590" y="310" font-size="48" font-weight="700" fill="#A8956E">18+</text>
  <text x="590" y="335" font-size="13" fill="#78716C">outfit combinations</text>

  <line x1="590" y1="355" x2="820" y2="355" stroke="#E7E5E4" stroke-width="1"/>

  <text x="590" y="390" font-size="13" fill="#78716C" font-style="italic">"You already own more</text>
