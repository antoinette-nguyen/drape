<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="460" fill="#FAFAF8"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="600" fill="#1C1917">The Problem Drape Solves</text>
  <text x="60" y="74" font-size="13" fill="#78716C">Decision paralysis is real. 68% of people feel they have "nothing to wear" despite a full wardrobe.</text>
  <line x1="60" y1="90" x2="840" y2="90" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Before panel -->
  <rect x="60" y="110" width="375" height="300" rx="12" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <rect x="60" y="110" width="375" height="48" rx="12" fill="#F5F0EB"/>
  <rect x="60" y="132" width="375" height="26" fill="#F5F0EB"/>
  <text x="247" y="140" font-size="13" font-weight="600" fill="#78716C" text-anchor="middle">WITHOUT DRAPE</text>

  <!-- Chaotic wardrobe illustration -->
  <rect x="88" y="174" width="48" height="56" rx="4" fill="#E7E5E4" transform="rotate(-8, 112, 202)"/>
  <rect x="148" y="168" width="48" height="56" rx="4" fill="#D4CFC9" transform="rotate(5, 172, 196)"/>
  <rect x="210" y="178" width="48" height="56" rx="4" fill="#C4B8B0" transform="rotate(-3, 234, 206)"/>
  <rect x="272" y="170" width="48" height="56" rx="4" fill="#E7E5E4" transform="rotate(7, 296, 198)"/>
  <rect x="336" y="176" width="48" height="56" rx="4" fill="#D4CFC9" transform="rotate(-5, 360, 204)"/>

  <rect x="88" y="246" width="48" height="56" rx="4" fill="#C4B8B0" transform="rotate(4, 112, 274)"/>
  <rect x="148" y="240" width="48" height="56" rx="4" fill="#E7E5E4" transform="rotate(-6, 172, 268)"/>
  <rect x="210" y="250" width="48" height="56" rx="4" fill="#D4CFC9" transform="rotate(2, 234, 278)"/>
  <rect x="272" y="244" width="48" height="56" rx="4" fill="#C4B8B0" transform="rotate(-4, 296, 272)"/>
  <rect x="336" y="248" width="48" height="56" rx="4" fill="#E7E5E4" transform="rotate(6, 360, 276)"/>

  <text x="247" y="336" font-size="24" text-anchor="middle">😩</text>
  <text x="247" y="362" font-size="14" font-weight="600" fill="#78716C" text-anchor="middle">"I have nothing to wear"</text>
  <text x="247" y="382" font-size="12" fill="#A8956E" text-anchor="middle">Full wardrobe. Zero inspiration.</text>

  <!-- Divider with arrow -->
  <circle cx="450" cy="260" r="28" fill="#1C1917"/>
  <text x="450" y="255" font-size="16" text-anchor="middle" fill="white">→</text>
  <text x="450" y="272" font-size="10" fill="#A8956E" text-anchor="middle">Drape</text>

  <!-- After panel -->
  <rect x="465" y="110" width="375" height="300" rx="12" fill="#1C1917"/>
  <rect x="465" y="110" width="375" height="48" rx="12" fill="#2D2926"/>
  <rect x="465" y="132" width="375" height="26" fill="#2D2926"/>
  <text x="652" y="140" font-size="13" font-weight="600" fill="#A8956E" text-anchor="middle">WITH DRAPE</text>

  <!-- Clean outfit cards -->
  <rect x="490" y="174" width="155" height="116" rx="8" fill="#2D2926"/>
  <text x="568" y="198" font-size="11" font-weight="600" fill="#FAFAF8" text-anchor="middle">Look 01</text>
  <rect x="506" y="208" width="28" height="28" rx="4" fill="#F5F0EB"/>
  <rect x="542" y="208" width="28" height="28" rx="4" fill="#2D3748"/>
  <rect x="578" y="208" width="28" height="28" rx="4" fill="#1A1A1A"/>
  <text x="568" y="260" font-size="10" fill="#78716C" text-anchor="middle">Cream · Navy · Black</text>
  <text x="568" y="278" font-size="10" fill="#A8956E" text-anchor="middle">Smart casual ✦</text>

  <rect x="655" y="174" width="155" height="116" rx="8" fill="#2D2926"/>
  <text x="732" y="198" font-size="11" font-weight="600" fill="#FAFAF8" text-anchor="middle">Look 02</text>
  <rect x="671" y="208" width="28" height="28" rx="4" fill="#C4A882"/>
  <rect x="707" y="208" width="28" height="28" rx="4" fill="#F5F5F5" stroke="#3D3733" stroke-width="1"/>
  <rect x="743" y="208" width="28" height="28" rx="4" fill="#8B7355"/>
  <text x="732" y="260" font-size="10" fill="#78716C" text-anchor="middle">Camel · White · Tan</text>
  <text x="732" y="278" font-size="10" fill="#A8956E" text-anchor="middle">Weekend ✦</text>

  <rect x="490" y="302" width="320" height="52" rx="8" fill="#A8956E"/>
  <text x="650" y="322" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Shopping recommendation</text>
  <text x="650" y="340" font-size="10" fill="#F5EFE6" text-anchor="middle">A pair of straight-leg trousers unlocks 6 new looks →</text>

  <text x="652" y="382" font-size="14" font-weight="600" fill="#FAFAF8" text-anchor="middle">"I never thought to wear that."</text>
  <text x="652" y="400" font-size="12" fill="#A8956E" text-anchor="middle">That's the wow moment.</text>

  <!-- Footer -->
  <text x="60" y="448" font-size="11" fill="#C4B8B0">Drape — AI Outfit Planner</text>
</svg>
