<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="500" fill="#FAFAF8"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="600" fill="#1C1917">Information Architecture</text>
  <text x="60" y="74" font-size="13" fill="#78716C">Every screen, state, and component — mapped</text>
  <line x1="60" y1="90" x2="840" y2="90" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Root node -->
  <rect x="366" y="110" width="168" height="44" rx="8" fill="#1C1917"/>
  <text x="450" y="137" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">drape.app</text>

  <!-- Root branches -->
  <line x1="450" y1="154" x2="450" y2="174" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="160" y1="174" x2="740" y2="174" stroke="#D4CFC9" stroke-width="1.5"/>

  <!-- Branch lines down -->
  <line x1="160" y1="174" x2="160" y2="194" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="350" y1="174" x2="350" y2="194" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="550" y1="174" x2="550" y2="194" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="740" y1="174" x2="740" y2="194" stroke="#D4CFC9" stroke-width="1.5"/>

  <!-- Level 1 nodes -->
  <rect x="88" y="194" width="144" height="40" rx="8" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="160" y="219" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">/ Landing</text>

  <rect x="278" y="194" width="144" height="40" rx="8" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="350" y="219" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">/login</text>

  <rect x="478" y="194" width="144" height="40" rx="8" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="550" y="219" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">/signup</text>

  <rect x="668" y="194" width="144" height="40" rx="8" fill="#A8956E"/>
  <text x="740" y="219" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">/dashboard ✦</text>

  <!-- Dashboard branch -->
  <line x1="740" y1="234" x2="740" y2="260" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="580" y1="260" x2="900" y2="260" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="580" y1="260" x2="580" y2="280" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="740" y1="260" x2="740" y2="280" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="870" y1="260" x2="870" y2="280" stroke="#D4CFC9" stroke-width="1.5"/>

  <!-- Dashboard tabs -->
  <rect x="508" y="280" width="144" height="40" rx="8" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="580" y="305" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">Wardrobe Tab</text>

  <rect x="668" y="280" width="144" height="40" rx="8" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="740" y="305" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">Outfits Tab</text>

  <rect x="798" y="280" width="144" height="40" rx="8" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="870" y="305" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">Header Nav</text>

