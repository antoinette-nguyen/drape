  <line x1="580" y1="320" x2="580" y2="345" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="460" y1="345" x2="700" y2="345" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="460" y1="345" x2="460" y2="365" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="580" y1="345" x2="580" y2="365" stroke="#D4CFC9" stroke-width="1.5"/>
  <line x1="700" y1="345" x2="700" y2="365" stroke="#D4CFC9" stroke-width="1.5"/>

  <rect x="394" y="365" width="132" height="36" rx="6" fill="#F5F0EB"/>
  <text x="460" y="388" font-size="11" fill="#78716C" text-anchor="middle">UploadItem</text>

  <rect x="514" y="365" width="132" height="36" rx="6" fill="#F5F0EB"/>
  <text x="580" y="388" font-size="11" fill="#78716C" text-anchor="middle">WardrobeGrid</text>

  <rect x="634" y="365" width="132" height="36" rx="6" fill="#F5F0EB"/>
  <text x="700" y="388" font-size="11" fill="#78716C" text-anchor="middle">ItemCard</text>

  <!-- Outfits children -->
  <line x1="740" y1="320" x2="740" y2="345" stroke="#D4CFC9" stroke-width="1.5"/>

  <!-- API routes box -->
  <rect x="60" y="260" width="380" height="160" rx="10" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="80" y="288" font-size="11" font-weight="600" fill="#A8956E" letter-spacing="1">API ROUTES</text>
  <rect x="80" y="298" width="340" height="28" rx="5" fill="#F5F0EB"/>
  <text x="100" y="317" font-size="11" fill="#78716C">POST /api/analyze-item</text>
  <rect x="80" y="334" width="340" height="28" rx="5" fill="#F5F0EB"/>
  <text x="100" y="353" font-size="11" fill="#78716C">POST /api/generate-outfit</text>
  <rect x="80" y="370" width="340" height="28" rx="5" fill="#F5F0EB"/>
  <text x="100" y="389" font-size="11" fill="#78716C">GET /api/auth/callback</text>

  <!-- Component leaf nodes -->
  <rect x="394" y="420" width="132" height="28" rx="5" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1"/>
  <text x="460" y="439" font-size="10" fill="#78716C" text-anchor="middle">Supabase Storage</text>

  <rect x="514" y="420" width="132" height="28" rx="5" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1"/>
  <text x="580" y="439" font-size="10" fill="#78716C" text-anchor="middle">RLS Policies</text>

  <rect x="634" y="420" width="132" height="28" rx="5" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1"/>
  <text x="700" y="439" font-size="10" fill="#78716C" text-anchor="middle">Delete Action</text>

  <!-- Footer -->
  <text x="60" y="488" font-size="11" fill="#C4B8B0">Drape — AI Outfit Planner</text>
