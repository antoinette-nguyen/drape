<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="520" fill="#1C1917"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="600" fill="#FAFAF8">Outfit Combination Graph</text>
  <text x="60" y="74" font-size="13" fill="#78716C">Your wardrobe as a network — each edge is a valid pairing</text>
  <line x1="60" y1="90" x2="840" y2="90" stroke="#2D2926" stroke-width="1"/>

  <!-- Edges (draw first so nodes appear on top) -->
  <!-- White Tee connections -->
  <line x1="450" y1="220" x2="280" y2="160" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="450" y1="220" x2="620" y2="160" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="450" y1="220" x2="200" y2="300" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="450" y1="220" x2="700" y2="300" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="450" y1="220" x2="310" y2="390" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="450" y1="220" x2="590" y2="390" stroke="#3D3733" stroke-width="1.5"/>

  <!-- Navy Blazer connections -->
  <line x1="280" y1="160" x2="200" y2="300" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="280" y1="160" x2="310" y2="390" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="280" y1="160" x2="700" y2="300" stroke="#A8956E" stroke-width="2"/>

  <!-- Black Jeans connections -->
  <line x1="620" y1="160" x2="700" y2="300" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="620" y1="160" x2="590" y2="390" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="620" y1="160" x2="200" y2="300" stroke="#3D3733" stroke-width="1.5"/>

  <!-- Beige Trench connections -->
  <line x1="200" y1="300" x2="310" y2="390" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="200" y1="300" x2="590" y2="390" stroke="#3D3733" stroke-width="1.5"/>

  <!-- White Sneakers connections -->
  <line x1="700" y1="300" x2="310" y2="390" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="700" y1="300" x2="590" y2="390" stroke="#3D3733" stroke-width="1.5"/>

  <!-- Silk Scarf connections -->
  <line x1="310" y1="390" x2="590" y2="390" stroke="#3D3733" stroke-width="1.5"/>

  <!-- Highlighted outfit path -->
  <line x1="450" y1="220" x2="280" y2="160" stroke="#A8956E" stroke-width="2.5"/>
  <line x1="280" y1="160" x2="620" y2="160" stroke="#A8956E" stroke-width="2.5"/>
  <line x1="620" y1="160" x2="450" y2="220" stroke="#A8956E" stroke-width="2.5"/>

  <!-- Center node: White Tee -->
  <circle cx="450" cy="220" r="44" fill="#A8956E"/>
  <text x="450" y="215" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">White</text>
  <text x="450" y="230" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Tee</text>
  <text x="450" y="245" font-size="9" fill="#F5EFE6" text-anchor="middle">tops</text>

  <!-- Navy Blazer node -->
  <circle cx="280" cy="160" r="40" fill="#2D3748"/>
  <text x="280" y="155" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">Navy</text>
  <text x="280" y="170" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">Blazer</text>
  <text x="280" y="183" font-size="9" fill="#A8956E" text-anchor="middle">outerwear</text>

  <!-- Black Jeans node -->
  <circle cx="620" cy="160" r="40" fill="#2D2926" stroke="#3D3733" stroke-width="2"/>
  <text x="620" y="155" font-size="10" font-weight="600" fill="#FAFAF8" text-anchor="middle">Black</text>
  <text x="620" y="170" font-size="10" font-weight="600" fill="#FAFAF8" text-anchor="middle">Jeans</text>
  <text x="620" y="183" font-size="9" fill="#78716C" text-anchor="middle">bottoms</text>

  <!-- Beige Trench node -->
  <circle cx="200" cy="300" r="40" fill="#C4A882"/>
  <text x="200" y="295" font-size="10" font-weight="600" fill="#1C1917" text-anchor="middle">Beige</text>
  <text x="200" y="310" font-size="10" font-weight="600" fill="#1C1917" text-anchor="middle">Trench</text>
  <text x="200" y="323" font-size="9" fill="#1C1917" text-anchor="middle">outerwear</text>

  <!-- White Sneakers node -->
  <circle cx="700" cy="300" r="40" fill="#F5F5F5"/>
  <text x="700" y="295" font-size="10" font-weight="600" fill="#1C1917" text-anchor="middle">White</text>
  <text x="700" y="310" font-size="10" font-weight="600" fill="#1C1917" text-anchor="middle">Sneakers</text>
  <text x="700" y="323" font-size="9" fill="#78716C" text-anchor="middle">shoes</text>

  <!-- Silk Scarf node -->
  <circle cx="310" cy="390" r="36" fill="#D4A5A5"/>
  <text x="310" y="385" font-size="10" font-weight="600" fill="#1C1917" text-anchor="middle">Silk</text>
  <text x="310" y="400" font-size="10" font-weight="600" fill="#1C1917" text-anchor="middle">Scarf</text>

  <!-- Chinos node (recommended) -->
  <circle cx="590" cy="390" r="36" fill="#2D2926" stroke="#A8956E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="590" y="382" font-size="10" fill="#A8956E" text-anchor="middle">+ Tan</text>
  <text x="590" y="397" font-size="10" fill="#A8956E" text-anchor="middle">Chinos</text>
  <text x="590" y="412" font-size="8" fill="#78716C" text-anchor="middle">recommended</text>

  <!-- Legend -->
  <rect x="620" y="440" width="220" height="60" rx="8" fill="#2D2926"/>
  <line x1="636" y1="460" x2="660" y2="460" stroke="#A8956E" stroke-width="2.5"/>
  <text x="668" y="464" font-size="11" fill="#FAFAF8">Active outfit path</text>
  <line x1="636" y1="482" x2="660" y2="482" stroke="#3D3733" stroke-width="1.5"/>
  <text x="668" y="486" font-size="11" fill="#78716C">Valid pairing</text>

  <!-- Footer -->
  <text x="60" y="508" font-size="11" fill="#3D3733">Drape — AI Outfit Planner</text>
</svg>
