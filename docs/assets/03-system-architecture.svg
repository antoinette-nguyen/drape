<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="500" fill="#FAFAF8"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="600" fill="#1C1917">System Architecture</text>
  <text x="60" y="74" font-size="13" fill="#78716C">How the pieces connect — from browser to AI and back</text>
  <line x1="60" y1="90" x2="840" y2="90" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Column 1: Client -->
  <rect x="60" y="115" width="220" height="340" rx="12" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <rect x="60" y="115" width="220" height="44" rx="12" fill="#1C1917"/>
  <rect x="60" y="137" width="220" height="22" fill="#1C1917"/>
  <text x="170" y="143" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">CLIENT</text>
  <text x="170" y="157" font-size="11" fill="#A8956E" text-anchor="middle">Browser / Next.js App</text>

  <rect x="80" y="178" width="180" height="38" rx="6" fill="#F5F0EB"/>
  <text x="170" y="195" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">Landing Page</text>
  <text x="170" y="209" font-size="10" fill="#78716C" text-anchor="middle">/ — Static</text>

  <rect x="80" y="226" width="180" height="38" rx="6" fill="#F5F0EB"/>
  <text x="170" y="243" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">Auth Pages</text>
  <text x="170" y="257" font-size="10" fill="#78716C" text-anchor="middle">/login · /signup</text>

  <rect x="80" y="274" width="180" height="38" rx="6" fill="#F5F0EB"/>
  <text x="170" y="291" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">Dashboard</text>
  <text x="170" y="305" font-size="10" fill="#78716C" text-anchor="middle">/dashboard — SSR</text>

  <rect x="80" y="322" width="180" height="38" rx="6" fill="#F5F0EB"/>
  <text x="170" y="339" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">Wardrobe Grid</text>
  <text x="170" y="353" font-size="10" fill="#78716C" text-anchor="middle">Client Component</text>

  <rect x="80" y="370" width="180" height="38" rx="6" fill="#F5F0EB"/>
  <text x="170" y="387" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">Outfit Generator</text>
  <text x="170" y="401" font-size="10" fill="#78716C" text-anchor="middle">Client Component</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="285" x2="320" y2="285" stroke="#A8956E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,280 328,285 320,290" fill="#A8956E"/>
  <text x="286" y="278" font-size="9" fill="#A8956E">fetch</text>

  <!-- Column 2: API -->
  <rect x="340" y="115" width="220" height="340" rx="12" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <rect x="340" y="115" width="220" height="44" rx="12" fill="#A8956E"/>
  <rect x="340" y="137" width="220" height="22" fill="#A8956E"/>
  <text x="450" y="143" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">API LAYER</text>
  <text x="450" y="157" font-size="11" fill="#FAFAF8" text-anchor="middle">Next.js Route Handlers</text>

  <rect x="360" y="178" width="180" height="52" rx="6" fill="#F5F0EB"/>
  <text x="450" y="199" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">POST /api/analyze-item</text>
  <text x="450" y="214" font-size="10" fill="#78716C" text-anchor="middle">Image URL → Claude Vision</text>
  <text x="450" y="226" font-size="10" fill="#78716C" text-anchor="middle">Returns: name, category, color</text>

  <rect x="360" y="244" width="180" height="52" rx="6" fill="#F5F0EB"/>
  <text x="450" y="265" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">POST /api/generate-outfit</text>
  <text x="450" y="280" font-size="10" fill="#78716C" text-anchor="middle">Wardrobe → Claude</text>
  <text x="450" y="292" font-size="10" fill="#78716C" text-anchor="middle">Returns: outfits + recs</text>

  <rect x="360" y="310" width="180" height="38" rx="6" fill="#F5F0EB"/>
  <text x="450" y="327" font-size="12" font-weight="500" fill="#1C1917" text-anchor="middle">GET /api/auth/callback</text>
  <text x="450" y="341" font-size="10" fill="#78716C" text-anchor="middle">Email confirmation handler</text>

  <!-- Arrow 2→3 -->
  <line x1="560" y1="285" x2="600" y2="285" stroke="#A8956E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="600,280 608,285 600,290" fill="#A8956E"/>
  <text x="566" y="278" font-size="9" fill="#A8956E">calls</text>

  <!-- Column 3: Services -->
  <rect x="620" y="115" width="220" height="340" rx="12" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <rect x="620" y="115" width="220" height="44" rx="12" fill="#1C1917"/>
  <rect x="620" y="137" width="220" height="22" fill="#1C1917"/>
  <text x="730" y="143" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">SERVICES</text>
  <text x="730" y="157" font-size="11" fill="#A8956E" text-anchor="middle">External APIs</text>

  <rect x="640" y="178" width="180" height="80" rx="6" fill="#F5F0EB"/>
  <text x="730" y="200" font-size="12" font-weight="600" fill="#1C1917" text-anchor="middle">Supabase</text>
  <text x="730" y="218" font-size="10" fill="#78716C" text-anchor="middle">PostgreSQL database</text>
  <text x="730" y="232" font-size="10" fill="#78716C" text-anchor="middle">Object storage (photos)</text>
  <text x="730" y="246" font-size="10" fill="#78716C" text-anchor="middle">Auth + RLS security</text>

  <rect x="640" y="272" width="180" height="80" rx="6" fill="#F5F0EB"/>
  <text x="730" y="294" font-size="12" font-weight="600" fill="#1C1917" text-anchor="middle">Claude API</text>
  <text x="730" y="312" font-size="10" fill="#78716C" text-anchor="middle">claude-opus-4-6</text>
  <text x="730" y="326" font-size="10" fill="#78716C" text-anchor="middle">Vision + language model</text>
  <text x="730" y="340" font-size="10" fill="#78716C" text-anchor="middle">Style reasoning</text>

  <rect x="640" y="366" width="180" height="52" rx="6" fill="#1C1917"/>
  <text x="730" y="387" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Vercel</text>
  <text x="730" y="403" font-size="10" fill="#A8956E" text-anchor="middle">Hosting + Edge Network</text>
  <text x="730" y="415" font-size="10" fill="#A8956E" text-anchor="middle">CI/CD via GitHub</text>

  <!-- Footer -->
  <text x="60" y="488" font-size="11" fill="#C4B8B0">Drape — AI Outfit Planner</text>
</svg>
